<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <title>Checkout - Paria Kids Shop</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;200;300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>


  <!-- 🔹 NAVBAR -->
  <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
    <div class="container">
      <img src="images/Logo.png" class="logo" img-fluid>


      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div id="menu" class="collapse navbar-collapse">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">صفحه اصلی</a></li>

          <li class="nav-item dropdown"><a class="nav-link dropdown-toggle" href="#" role="button"
              data-bs-toggle="dropdown">دخترانه</a>
            <ul class="dropdown-menu text-end">
              <li><a class="dropdown-item" href="dress.html">پیراهن</a></li>
              <li><a class="dropdown-item" href="girl's-t-shirt.html">تیشرت</a></li>
              <li><a class="dropdown-item" href="#">شلوار</a></li>
              <li><a class="dropdown-item" href="#">دامن</a></li>
            </ul>
          </li>
          <li class="nav-item dropdown"><a class="nav-link dropdown-toggle" href="#" role="button"
              data-bs-toggle="dropdown">پسرانه</a>
            <ul class="dropdown-menu text-end">
              <li><a class="dropdown-item" href="shirts.html">پیراهن</a></li>
              <li><a class="dropdown-item" href="boy's-t-shirt.html">تیشرت</a></li>
              <li><a class="dropdown-item" href="boy's-pants.html">شلوار</a></li>
              <li><a class="dropdown-item" href="shorts.html">شلوارک</a></li>
            </ul>
          </li>
          <li class="nav-item dropdown"><a class="nav-link dropdown-toggle" href="#" role="button"
              data-bs-toggle="dropdown">اکسسوری</a>
            <ul class="dropdown-menu text-end">
              <li><a class="dropdown-item" href="#">اکسسوری دخترانه</a></li>
              <li><a class="dropdown-item" href="#">اکسسوری پسرانه</a></li>
            </ul>
          </li>
          <li class="nav-item"><a class="nav-link" href="new.html">جدیدترین‌ها</a></li>
        </ul>

        <div class="d-flex align-items-center gap-2">

          <input type="text" id="searchInput" class="form-control form-control-sm" style="width: 150px;"
            placeholder="جستجوی محصول ...">

          <a href="wishlist.html" id="fav" class="wishlist-add">
            <i class="fa fa-heart"></i>
          </a>
          <i class="fa fa-shopping-cart" id="cartBtn"></i>
          <button id="darkToggle" class="btn btn-sm btn-outline-dark">
            🌙
          </button>

        </div>
      </div>
    </div>
  </nav>

  <!-- 🔹 CHECKOUT FORM -->
  <section class="checkout-box">

    <h4 class="text-center mb-4">🛒 تکمیل سفارش</h4>

    <form id="checkoutForm">

      <!-- نام -->
      <div class="mb-3">
        <input type="text" id="name" class="form-control" placeholder="نام کامل" required>
        <small class="error" id="nameError"></small>
      </div>

      <!-- ایمیل -->
      <div class="mb-3">
        <input type="email" id="email" class="form-control" placeholder="ایمیل" required>
        <small class="error" id="emailError"></small>
      </div>

      <!-- شماره -->
      <div class="mb-3">
        <input type="text" id="phone" class="form-control" placeholder="شماره تماس" required>
        <small class="error" id="phoneError"></small>
      </div>

      <!-- آدرس -->
      <div class="mb-3">
        <textarea id="address" class="form-control" placeholder="آدرس کامل" required></textarea>
        <small class="error" id="addressError"></small>
      </div>

      <!-- رمز -->
      <div class="mb-3">
        <input type="password" id="password" class="form-control" placeholder="رمز عبور" required>
        <small class="error" id="passwordError"></small>
      </div>

      <!-- دکمه -->
      <button type="submit" class="btn btn-main w-100">
        ثبت سفارش
      </button>

    </form>

  </section>

  <!-- 🔹 FOOTER -->
  <footer class="text-center mt-5 p-4 bg-light">
    <p>© 2026 Paria Kids Shop</p>
  </footer>

  <!-- 🔹 SCRIPT -->
  <script src="js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
